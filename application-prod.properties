quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

# =========================
# CORS
# =========================
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.exposed-headers=*
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# =========================
# POSTGRESQL DATABASE
# =========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.idle-removal-interval=5M

# update | validate | none
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# =========================
# JWT
# =========================
quarkus.smallrye-jwt.enabled=true

mp.jwt.verify.issuer=${JWT_ISSUER}

mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
smallrye.jwt.sign.key=${JWT_PRIVATE_KEY}

# =========================
# SECURITY
# =========================

# Public Auth APIs
quarkus.http.auth.permission.auth-permit.paths=/auth/*
quarkus.http.auth.permission.auth-permit.policy=permit

# Swagger / OpenAPI
quarkus.http.auth.permission.public.paths=/apis*,/q/openapi,/health*
quarkus.http.auth.permission.public.policy=permit

# Protected APIs
quarkus.http.auth.permission.authenticated.paths=/users/*,/movies/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# =========================
# SWAGGER / OPENAPI
# =========================
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/apis
quarkus.smallrye-openapi.path=/q/openapi

# =========================
# LOGGING
# =========================
quarkus.log.level=INFO
quarkus.log.console.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

quarkus.log.category."io.smallrye.jwt".level=INFO
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."org.hibernate".level=WARN

# =========================
# EXTERNAL API
# =========================
external.api.base-url=${EXTERNAL_API_BASE_URL}

# =========================
# QUARKUS
# =========================
quarkus.package.type=jar
quarkus.banner.enabled=true